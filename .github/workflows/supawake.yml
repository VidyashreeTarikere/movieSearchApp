name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 06:00 UTC
    - cron: '0 6 */3 * *'
  # Allows you to manually trigger the workflow from GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install supawake
        run: npm install -g supawake
      
      - name: Create config directory
        run: mkdir -p "$HOME/.config/supawake"
      
      - name: Write config from secret
        run: |
          echo "$SUPAWAKE_CONFIG" > "$HOME/.config/supawake/config.json"
        env:
          SUPAWAKE_CONFIG: ${{ secrets.SUPAWAKE_CONFIG }}
      
      - name: Ping Supabase project
        run: supawake ping